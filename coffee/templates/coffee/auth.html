{% extends 'coffee/base.html' %}

{% block page_id %}auth{% endblock %}

{% block content %}
<section class="panel active auth-page">
  <h2>Account</h2>
  <div class="auth-wrapper">
    <article class="card auth-card">
      <h3>Login</h3>
      <form id="login-form" class="form-grid">
        <input id="login-username" placeholder="Username or Email" required />
        <input id="login-password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p class="auth-helper">Don't have an account? <a href="/auth/register/">Register here</a></p>
      <p id="login-message" class="message"></p>
    </article>
  </div>
</section>
{% endblock %}
