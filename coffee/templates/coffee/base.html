{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee App</title>
  <link rel="stylesheet" href="{% static 'coffee/app.css' %}">
</head>
<body data-page="{% block page_id %}{% endblock %}" data-recipe-id="{% block recipe_id %}{% endblock %}">
  <header class="topbar">
    <h1>Coffee App Frontend</h1>
    <div class="user-select">
      <a class="auth-icon {% if active_page == 'auth' or active_page == 'register' or active_page == 'user' %}active{% endif %}" href="/users/me/" title="Account" aria-label="Account">👤</a>
      <span id="auth-user">Not signed in</span>
      <button id="logout-btn" class="secondary" style="display:none;">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    <a class="tab {% if active_page == 'beans' %}active{% endif %}" href="/beans/">Bean Explorer</a>
    <a class="tab {% if active_page == 'recipes' %}active{% endif %}" href="/recipes/">Public Recipes</a>
    <a class="tab {% if active_page == 'create' %}active{% endif %}" href="/recipes/create/">Create Recipe</a>
    <a class="tab {% if active_page == 'brew' %}active{% endif %}" href="/brews/log/">Log Brew</a>
    <a class="tab {% if active_page == 'analytics' %}active{% endif %}" href="/analytics/">Analytics</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'coffee/app.js' %}"></script>
</body>
</html>
